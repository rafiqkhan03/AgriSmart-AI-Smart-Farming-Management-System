<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriSmart — Create Account</title>
    <meta name="description" content="Create your AgriSmart account to start managing your farm with AI-powered insights.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a1628;
            --accent: #34d399;
            --accent-glow: rgba(52, 211, 153, 0.35);
            --accent-dark: #059669;
            --text-primary: #f0fdf4;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(52, 211, 153, 0.15);
            --input-bg: rgba(15, 23, 42, 0.5);
            --input-border: rgba(148, 163, 184, 0.2);
            --danger: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        .bg-image {
            position: fixed;
            inset: 0;
            background: url('assets/signup_bg.png') center/cover no-repeat;
            z-index: 0;
        }
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(10,22,40,0.4) 0%, rgba(5,15,30,0.3) 50%, rgba(10,22,40,0.4) 100%);
            z-index: 1;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 2;
            animation: orbFloat 12s ease-in-out infinite;
            pointer-events: none;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.25), transparent 70%);
            top: -100px; right: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            bottom: -80px; left: -80px;
            animation-delay: -4s;
        }
        .orb-3 {
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.15), transparent 70%);
            top: 40%; right: 20%;
            animation-delay: -8s;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-15px, 15px) scale(0.95); }
        }

        .signup-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            margin: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(1.8);
            -webkit-backdrop-filter: blur(24px) saturate(1.8);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 2.5rem 2.5rem;
            box-shadow:
                0 30px 60px -15px rgba(0,0,0,0.5),
                0 0 80px -20px var(--accent-glow),
                inset 0 1px 0 rgba(255,255,255,0.05);
            animation: cardSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        @keyframes cardSlideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.75rem;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px var(--accent-glow);
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 8px 24px var(--accent-glow); }
            50% { box-shadow: 0 8px 40px rgba(52,211,153,0.5); }
        }
        .logo-icon svg { width: 24px; height: 24px; color: white; }
        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent), #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .heading {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .heading h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .heading p { font-size: 0.9rem; color: var(--text-secondary); }

        /* Feature pills */
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1.75rem;
        }
        .feature-pill {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.85rem;
            background: rgba(52, 211, 153, 0.08);
            border: 1px solid rgba(52, 211, 153, 0.15);
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .feature-pill svg { width: 12px; height: 12px; }

        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 0.875rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .form-group input::placeholder { color: rgba(148, 163, 184, 0.5); }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.1), 0 0 20px rgba(52, 211, 153, 0.08);
            background: rgba(15, 23, 42, 0.7);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 0.875rem;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            box-shadow: 0 8px 30px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }
        .btn-primary:hover::before { transform: translateX(100%); }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(52, 211, 153, 0.45);
        }
        .btn-primary:active { transform: translateY(0) scale(0.98); }
        .btn-primary svg { width: 20px; height: 20px; }

        .message {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--danger);
            min-height: 1.5rem;
            margin-top: 0.75rem;
        }

        .divider {
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            text-align: center;
        }
        .divider p { font-size: 0.875rem; color: var(--text-secondary); }
        .divider a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
        }
        .divider a::after {
            content: '';
            position: absolute;
            left: 0; bottom: -2px;
            width: 0; height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        .divider a:hover::after { width: 100%; }
        .divider a:hover { color: #a7f3d0; }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: particleDrift 8s linear infinite;
        }
        @keyframes particleDrift {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1); }
        }

        @media (max-width: 480px) {
            .signup-card { padding: 2rem 1.5rem; border-radius: 1.5rem; }
            .heading h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="particles" id="particles"></div>

<div class="signup-card">
    <div class="logo-wrap">
        <div class="logo-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <span class="logo-text">AgriSmart</span>
    </div>

    <div class="heading">
        <h1>Create Account</h1>
        <p>Join the next generation of smart farming</p>
    </div>

    <div class="features">
        <div class="feature-pill">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            AI Predictions
        </div>
        <div class="feature-pill">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            Disease Detection
        </div>
        <div class="feature-pill">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            Market Insights
        </div>
    </div>

    <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" placeholder="John Doe" autocomplete="name">
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="new-password">
    </div>

    <button id="signup-btn" class="btn-primary" onclick="registerUser()">
        <span>Create Account</span>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
    </button>

    <p id="message" class="message"></p>

    <div class="divider">
        <p>Already have an account? <a href="login.html">Log in</a></p>
    </div>
</div>

<script>
// Generate floating particles
(function() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = (6 + Math.random() * 6) + 's';
        p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
        container.appendChild(p);
    }
})();

async function registerUser() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const messageEl = document.getElementById("message");

    if (!name || !email || !password) {
        messageEl.innerText = "Please fill all fields";
        return;
    }

    messageEl.innerText = "";

    try {
        const response = await fetch("http://127.0.0.1:8000/register?name=" + encodeURIComponent(name) + "&email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(password), {
            method: "POST"
        });

        const data = await response.json();

        if (data.message === "User registered successfully" || data.message) {
            messageEl.style.color = '#34d399';
            messageEl.innerText = data.message;
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        } else {
            messageEl.innerText = "Error creating user";
        }
    } catch(err) {
        messageEl.innerText = "Server error occurred";
    }
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') registerUser();
});
</script>
</body>
</html>
